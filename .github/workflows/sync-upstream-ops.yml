name: Sync Upstream Ops

on:
  schedule:
    # Runs daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/sync_ops.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ops/ .github/upstream-sync-state.json
          if git diff --cached --quiet; then
            echo "Nothing to commit — ops is already up to date."
          else
            git commit -m "chore(ops): sync new upstream files from Dumpstarr/Database"
            git push
          fi
